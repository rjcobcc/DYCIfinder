<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/popups.css">
    <title>DYCIfinder</title>
</head>
<body>
    <div>
        <h1>DYCIfinder</h1>
        <p>A website for retrieving lost and found items inside the campus</p> 
    </div>

    <div>
        <div id="login-form">
            <h2>Log in</h2>
            <input type="email" id="login-email">
            <input type="password" id="login-pass">
            <button id="login-btn">Log in</button>
            <br>
            <p>Don't have an account? <a href="#" id="register-tabbtn">Register</a></p>
            <button onclick="window.location.href='search_found.html'">Continue as Guest</button>
        </div>

        <div id="register-form" style="display: none;">
            <h2>Register</h2>
            <label>Email</label>
            <input type="email" id="register-email"><button id="getcode-btn">Get code</button>
            <br>
            <label>Code</label>
            <input type="text" id="register-code">
            <br>
            <label>Password</label>
            <br>
            <input type="password" id="register-pass0">
            <br>
            <input type="password" id="register-pass1">
            <br>
            <button id="register-btn">Register</button>
            <p>Already have an account? <a href="#" id="login-tabbtn">Log in</a></p>
            <br>
            <button onclick="window.location.href='search_found.html'">Continue as Guest</button>
        </div>
    </div>

    <script type="module" src="js/account.js"></script>
</body>
</html>
