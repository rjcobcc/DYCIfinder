<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYCIfinder</title>
</head>
<body>
    <header>
        <h2><a href="home.html">DYCIfinder</a></h2>
        <h3>Report a found item</h3>
    </header>
    <main>
        <div>
            <label for="finder">Finder's Name</label>
            <input type="text" id="finder">
            <br>
            <label for="item">Item Name</label>
            <input type="text" id="item">
            <br>
            <label for="category">Item Category</label>
            <select id="category"></select>
            <br>
            <label for="description">Item Description</label>
            <textarea id="description" rows="4"></textarea>
            <br>
            <label for="location">Find Location</label>
            <select id="location"></select>
            <br>
            <label for="date">Find Date</label>
            <input type="date" id="date">
            <br>
            <label for="image1">Photo 1 (Optional)</label>
            <input type="file" accept="image/*" id="image1">
            <button type="button" id="remove1" style="display: none;">Remove image</button>
            <img id="preview1">
            <br>
            <label for="image2">Photo 2 (Optional)</label>
            <input type="file" accept="image/*" id="image2">
            <button type="button" id="remove2" style="display: none;">Remove image</button>
            <img id="preview2">
            <br>
            <button id="submitButton">Submit</button>
        </div>
    </main>
    <script type="module" src="js/post_found.js"></script>
</body>
</html>
