<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYCIfinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="page-header">
        <div class="container">
            <h2>Report a found item</h2>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="row justify-content-center g-4">
                <div class="col-12 col-lg-8">
                    <!-- Claim Form -->
                    <div class="form-card">
                        <div class="mb-3">
                            <label for="claimDescription">Item Description for Proof</label>
                            <textarea id="claimDescription" class="form-control" rows="4" placeholder="Describe the item in detail to verify ownership…"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="claimantName">Item Name</label>
                            <input type="text" id="claimantName" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="contactno">Contact Number</label>
                            <input type="text" id="contactno" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="fbProfile">Facebook Profile <span class="optional-badge">Optional</span></label>
                            <input type="text" id="fbProfile" class="form-control" placeholder="https://facebook.com/yourprofile">
                        </div>
                        <div class="mb-3">
                            <label for="email">Email Address <span class="optional-badge">Optional</span></label>
                            <input type="text" id="email" class="form-control" placeholder="you@example.com">
                        </div>
                        <div class="mb-4">
                            <label for="contactinfo">Additional Contact Info <span class="optional-badge">Optional</span></label>
                            <textarea id="contactinfo" class="form-control" rows="3" placeholder="Any other way we can reach you…"></textarea>
                        </div>

                        <div class="d-grid">
                            <button id="submitClaimButton">Submit</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/post_found.js"></script>
</body>
</html>
