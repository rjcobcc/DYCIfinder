<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/popups.css">
    <title>DYCIfinder</title>
</head>
<body>
    <header>
        <h1><a href="index.html">DYCIfinder</a></h1>
        <button onclick="window.location.href='profile.html'">Profile</button>
        <button onclick="window.location.href='history.html'">History</button>
        <button onclick="window.location.href='search_found.html'">Browse found items</button>
        <button onclick="window.location.href='report_found.html'">Report a Find</button>
        <button onclick="window.location.href='report_lost.html'">Report a Loss</button>
        <hr>
    </header>
    
    <main>
        <div>
            <h3>Found Item's Details</h3>
            <label>Name</label>
            <input type="text" id="foundpost-itemname">
            <br>
            <label>Category</label>
            <select id="foundpost-itemcategory">
            </select>
            <br>
            <label>Description</label>
            <textarea id="foundpost-description"></textarea>
            <br>
            <label>Photo</label>
            <input type="file" accept="image/*" id="foundpost-image">
            <button id="remove-image" style="display: none;">X</button>
            <img id="preview-image">
            <br>
            <label>Find Location</label>
            <select id="foundpost-findlocation">
            </select>
            <br>
            <label>Find Date</label>
            <input type="date" id="foundpost-finddate">
            
            <h3>Finder's Details</h3>
            <label>Full Name</label>
            <input type="text" id="full-name" placeholder="Bob John C. Doe">
            <br>
            <label>Course & Section</label>
            <input type="text" id="course-section" placeholder="AB1C">
            <br>
            <label>Student ID</label>
            <input type="text" id="student-id" placeholder="20XX-XXXXX">
            <br>
            <label>Facebook Profile URL (optional)</label>
            <input type="url" id="fbprofile-url" placeholder="https://www.facebook.com/xxxxxxxxx">
            <br>
            <label>Phone Number (optional)</label>
            <input type="tel" id="phone-number" placeholder="09xxxxxxxxx">
            <br>
            <label>Email Address (optional)</label>
            <input type="text" id="email-address" placeholder="placeholder123@email.com">
            <br><br>
            <button id="submit-foundpost-btn">Submit</button>
        </div>
    </main>
    <script type="module" src="js/report_found.js"></script>
</body>
</html>
