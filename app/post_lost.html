<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYCIfinder</title>
</head>
<body>
    <header>
        <h2><a href="search.html">DYCIfinder</a></h2>
        <h3>Report a lost item</h3>
    </header>
    <main>
        <div>
            <label for="item_name">Item Name</label>
            <input type="text" id="item_name">
            <br>
            <label for="item_category">Item Category</label>
            <select id="item_category"></select>
            <br>
            <label for="item_description">Item Description</label>
            <textarea id="item_description" rows="4"></textarea>
            <br>
            <label for="lost_location">Lost Location</label>
            <select id="lost_location"></select>
            <br>
            <label for="lost_date">Lost Date</label>
            <input type="date" id="lost_date">
            <br>
            <label for="image1">Photo 1 (Optional)</label>
            <input type="file" accept="image/*" id="image1">
            <button type="button" id="remove1" style="display:none;">Remove image</button>
            <img id="preview1">
            <br>
            <label for="image2">Photo 2 (Optional)</label>
            <input type="file" accept="image/*" id="image2">
            <button type="button" id="remove2" style="display:none;">Remove image</button>
            <img id="preview2">
            <br>
            <label for="loster_name">Your Name</label>
            <input type="text" id="loster_name">
            <br>
            <label for="facebook_profile">Facebook Profile</label>
            <input type="text" id="facebook_profile">
            <br>
            <label for="contact_number">Contact Number</label>
            <input type="text" id="contact_number">
            <br>
            <label for="email_address">Email Address</label>
            <input type="text" id="email_address">
            <br>
            <button id="submitButton">Submit</button>
        </div>
    </main>
    <script type="module" src="js/post_lost.js"></script>
</body>
</html>
