<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/popups.css">
    <title>DYCIfinder</title>
</head>
<body>
    <header>
        <h1><a href="index.html">DYCIfinder</a></h1>
        <button onclick="window.location.href='profile.html'">Profile</button>
        <button onclick="window.location.href='history.html'">History</button>
        <button onclick="window.location.href='search_found.html'">Browse found items</button>
        <button onclick="window.location.href='report_found.html'">Report a Find</button>
        <button onclick="window.location.href='report_lost.html'">Report a Loss</button>
        <hr>
    </header>
    
    <main>
        <div>
            <h3>Lost Item's Details</h3>
            <label>Name</label>
            <input type="text" id="lostpost-itemname">
            <br>
            <label>Category</label>
            <select id="lostpost-itemcategory"></select>
            <br>
            <label>Description</label>
            <textarea id="lostpost-description"></textarea>
            <br>
            <label>Photo</label>
            <input type="file" accept="image/*" id="lostpost-image">
            <button type="button" id="remove-image" style="display:none;">X</button>
            <img id="preview-image">
            <br>
            <label>Lost Location</label>
            <select id="lostpost-lostlocation"></select>
            <br>
            <label>Lost Date</label>
            <input type="date" id="lostpost-lostdate">
            
            <h3>Owner's Details</h3>
            <label>Full Name</label>
            <input type="text" id="full-name" placeholder="Bob John C. Doe">
            <br>
            <label>Course & Section</label>
            <input type="text" id="course-section" placeholder="BSXX-1X">
            <br>
            <label>Student ID</label>
            <input type="text" id="student-id" placeholder="20XX-XXXXX">
            <br>
            <label>Facebook Profile URL</label>
            <input type="url" id="fbprofile-url" placeholder="https://www.facebook.com/xxxxxxxxx">
            <br>
            <label>Phone Number</label>
            <input type="tel" id="phone-number" placeholder="09xxxxxxxxx">
            <br>
            <label>Email Address (optional)</label>
            <input type="text" id="email-address" placeholder="placeholder123@email.com">
            <br><br>
            <button id="submit-lostpost-btn">Submit</button>
        </div>
    </main>
    <script type="module" src="js/report_lost.js"></script>
</body>
</html>
