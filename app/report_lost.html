<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYCIfinder — Report Lost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/popups.css">
    <link rel="stylesheet" href="./assets/style.css">

    <style>

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 2rem 2rem 2.25rem;
        }

        .form-section-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.25rem;
        }

        .section-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.75rem 0 1.5rem;
        }

        .form-card label {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: block;
        }

        .form-card input[type="text"],
        .form-card input[type="url"],
        .form-card input[type="tel"],
        .form-card input[type="date"],
        .form-card select,
        .form-card textarea {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text-primary);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-card input[type="text"]:focus,
        .form-card input[type="url"]:focus,
        .form-card input[type="tel"]:focus,
        .form-card input[type="date"]:focus,
        .form-card select:focus,
        .form-card textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,139,255,0.13);
            background: #fff;
        }

        .form-card textarea {
            resize: vertical;
            min-height: 90px;
        }

        .select-wrap { position: relative; }
        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.75rem;
            pointer-events: none;
        }
        .select-wrap select { padding-right: 30px; }

        .upload-area {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 1.25rem 1rem;
            text-align: center;
            transition: border-color 0.15s, background 0.15s;
            cursor: pointer;
            position: relative;
        }
        .upload-area:hover { border-color: var(--accent); background: #f0f4ff; }
        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .upload-icon { font-size: 1.6rem; margin-bottom: 4px; line-height: 1; }
        .upload-label-text { font-size: 0.82rem; color: var(--text-muted); }
        .upload-label-text span { color: var(--accent); font-weight: 600; }

        #preview-image {
            display: none;
            width: 100%;
            max-height: 220px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 10px;
            background: var(--surface);
        }
        #preview-image.visible { display: block; }

        #remove-image {
            display: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            color: #c0392b;
            background: #fff0ee;
            border: 1px solid #f5b7b1;
            border-radius: 6px;
            padding: 4px 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }
        #remove-image:hover { background: #fde8e6; }

        .optional-hint {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            margin-left: 4px;
        }

        #submit-lostpost-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(90deg, var(--blue-start), var(--blue-mid));
            border: none;
            border-radius: 9px;
            padding: 11px 36px;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.12s;
            width: 100%;
        }
        #submit-lostpost-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
        #submit-lostpost-btn:active { transform: translateY(0); }

    </style>
</head>
<body>

    <header>
        <div class="header-top d-flex align-items-center">
            <a href="index.html" class="brand">DYCI<span>finder</span></a>
        </div>
        <nav class="header-nav d-flex align-items-center">
            <a class="nav-link-item" onclick="window.location.href='search_found.html'">Found Items</a>
            <a class="nav-link-item" onclick="window.location.href='report_found.html'">Report Found</a>
            <a class="nav-link-item active" onclick="window.location.href='report_lost.html'">Report Lost</a>
            <a class="nav-link-item" onclick="window.location.href='history.html'">History</a>
            <a class="nav-link-item" onclick="window.location.href='profile.html'">Profile</a>
        </nav>
    </header>

    <main class="container-fluid px-4 px-md-5 mt-4">

        <div class="mb-1"><span class="section-label">Lost &amp; Found Portal</span></div>
        <h2 class="page-title mb-4">Report a Loss</h2>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">
                <div class="form-card">

                    <!-- LOST ITEM DETAILS -->
                    <div class="form-section-title">Lost Item's Details</div>

                    <div class="row g-3">

                        <div class="col-12 col-sm-6">
                            <label for="lostpost-itemname">Name</label>
                            <input type="text" id="lostpost-itemname" placeholder="e.g. Black wallet">
                        </div>

                        <div class="col-12 col-sm-6">
                            <label for="lostpost-itemcategory">Category</label>
                            <div class="select-wrap">
                                <select id="lostpost-itemcategory">
                                    <option value="">Select category…</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="lostpost-description">Description</label>
                            <textarea id="lostpost-description" placeholder="Describe the item — color, brand, distinguishing marks…"></textarea>
                        </div>

                        <div class="col-12">
                            <label>Photo</label>
                            <div class="upload-area" id="upload-area-container">
                                <input type="file" accept="image/*" id="lostpost-image">
                                <div class="upload-icon">🖼️</div>
                                <div class="upload-label-text"><span>Click to upload</span> or drag &amp; drop</div>
                                <div class="upload-label-text" style="font-size:0.72rem; margin-top:2px;">PNG, JPG, WEBP</div>
                            </div>
                            <img id="preview-image" alt="Image preview">
                            <button type="button" id="remove-image">✕ Remove photo</button>
                        </div>

                        <div class="col-12 col-sm-6">
                            <label for="lostpost-lostlocation">Lost Location</label>
                            <div class="select-wrap">
                                <select id="lostpost-lostlocation">
                                    <option value="">Select location…</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 col-sm-6">
                            <label for="lostpost-lostdate">Lost Date</label>
                            <input type="date" id="lostpost-lostdate">
                        </div>

                    </div>

                    <hr class="section-divider">

                    <!-- OWNER DETAILS -->
                    <div class="form-section-title">Owner's Details</div>

                    <div class="row g-3">

                        <div class="col-12">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" placeholder="Bob John C. Doe">
                        </div>

                        <div class="col-12 col-sm-6">
                            <label for="course-section">Course &amp; Section</label>
                            <input type="text" id="course-section" placeholder="BSXX-1X">
                        </div>

                        <div class="col-12 col-sm-6">
                            <label for="student-id">Student ID</label>
                            <input type="text" id="student-id" placeholder="20XX-XXXXX">
                        </div>

                        <div class="col-12">
                            <label for="fbprofile-url">Facebook Profile URL</label>
                            <input type="url" id="fbprofile-url" placeholder="https://www.facebook.com/xxxxxxxxx">
                        </div>

                        <div class="col-12 col-sm-6">
                            <label for="phone-number">Phone Number</label>
                            <input type="tel" id="phone-number" placeholder="09xxxxxxxxx">
                        </div>

                        <div class="col-12 col-sm-6">
                            <label for="email-address">Email Address <span class="optional-hint">(optional)</span></label>
                            <input type="text" id="email-address" placeholder="placeholder123@email.com">
                        </div>

                        <hr class="section-divider">
                            
                        <div class="col-12 mt-2">
                            <button id="submit-lostpost-btn">Submit Report</button>
                        </div>

                    </div>

                </div>
            </div>
        </div>

    </main>

    <script type="module" src="js/report_lost.js"></script>
</body>
</html>
