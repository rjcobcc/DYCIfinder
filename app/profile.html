<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/popups.css">
    <title>DYCIfinder</title>
</head>
<body>
    <header>
        <h1><a href="index.html">DYCIfinder</a></h1>
        <button onclick="window.location.href='profile.html'">Profile</button>
        <button onclick="window.location.href='history.html'">History</button>
        <button onclick="window.location.href='search_found.html'">Browse found items</button>
        <button onclick="window.location.href='report_found.html'">Report a Find</button>
        <button onclick="window.location.href='report_lost.html'">Report a Loss</button>
        <hr>
    </header>

    <div id="loggedout-page">
        <h3>Please <a href="account.html">log in</a> to view your profile</h3>
    </div>

    <div id="loggedin-page" style="display: none;">
        <label>Email</label>
        <input id="email" value="placeholder@email.com" readonly>
        <br>
        <button id="changepass-btn">Change password</button>
        <br>
        <label>Full Name</label>
        <input id="full-name" type="text">
        <br>
        <label>Student ID</label>
        <input id="student-id" type="text">
        <br>
        <label>Course & Section</label>
        <input id="course-section" type="text">
        <br>
        <label>Facebook Profile URL</label>
        <input id="fb-profile" type="url">
        <br>
        <label>Phone Number</label>
        <input id="contact-no" type="tel">
        <br>
        <p>Joined on: <span id="account-createdat"></span></p>
        <button id="save-btn">Save Changes</button>
        <br><br>
        <button id="logout-btn">Logout</button>
        <div id="changepass-form" style="display: none;">
            <hr>
            <label>Old Password</label>
            <input type="password" id="old-pass">
            <label>New Password</label>
            <input type="password" id="new-pass0">
            <input type="password" id="new-pass1">
            <button id="cancel-changepass-btn">Cancel</button>
            <button id="submit-changepass-btn">Submit</button>
        </div>
    </div>
    

    <script type="module" src="./js/profile.js"></script>
</body>
</html>
