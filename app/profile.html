<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYCIfinder — Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/popups.css">
    <link rel="stylesheet" href="./assets/style.css">

    <style>

        /* ── LOGGED OUT STATE ── */
        #loggedout-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            text-align: center;
        }

        .loggedout-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.35;
        }

        .loggedout-msg {
            font-family: 'Syne', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .loggedout-msg a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
        .loggedout-msg a:hover { text-decoration: underline; }

        /* ── PROFILE CARD ── */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 2rem 2rem 2.25rem;
        }

        /* Section titles */
        .form-section-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.25rem;
        }

        .section-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.75rem 0 1.5rem;
        }

        /* Labels */
        .profile-card label {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: block;
        }

        /* Inputs */
        .profile-card input[type="text"],
        .profile-card input[type="url"],
        .profile-card input[type="tel"],
        .profile-card input[type="password"],
        .profile-card input[type="email"] {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text-primary);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .profile-card input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,139,255,0.13);
            background: #fff;
        }

        /* Read-only email */
        .profile-card input[readonly] {
            color: var(--text-muted);
            cursor: default;
            background: #f0f2f8;
        }

        /* Joined date */
        .joined-text {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin: 0;
        }
        .joined-text span { font-weight: 600; color: var(--text-primary); }

        /* ── BUTTONS ── */
        #save-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(90deg, var(--blue-start), var(--blue-mid));
            border: none;
            border-radius: 9px;
            padding: 10px 28px;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.12s;
            width: 100%;
        }
        #save-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
        #save-btn:active { transform: translateY(0); }

        #changepass-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--blue-mid);
            background: #eef2ff;
            border: 1px solid #c7d5ff;
            border-radius: 7px;
            padding: 7px 16px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        #changepass-btn:hover {
            background: linear-gradient(90deg, var(--blue-start), var(--blue-mid));
            color: #fff;
            border-color: transparent;
        }

        #logout-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: #b91c1c;
            background: #fff5f5;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 9px 24px;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s, color 0.15s;
        }
        #logout-btn:hover { background: #fee2e2; }

        /* ── CHANGE PASSWORD PANEL ── */
        #changepass-form {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem 1.25rem 1.5rem;
            margin-top: 1rem;
        }

        .changepass-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        #changepass-form label {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: block;
        }

        #changepass-form input[type="password"] {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text-primary);
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        #changepass-form input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,139,255,0.13);
        }

        #submit-changepass-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(90deg, var(--blue-start), var(--blue-mid));
            border: none;
            border-radius: 7px;
            padding: 8px 20px;
            cursor: pointer;
            transition: opacity 0.18s;
        }
        #submit-changepass-btn:hover { opacity: 0.88; }

        #cancel-changepass-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }
        #cancel-changepass-btn:hover { background: var(--surface); }

        /* New password hint label */
        .pass-sublabel {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }

    </style>
</head>
<body>

    <header>
        <div class="header-top d-flex align-items-center">
            <a href="index.html" class="brand">DYCI<span>finder</span></a>
        </div>
        <nav class="header-nav d-flex align-items-center">
            <a class="nav-link-item" onclick="window.location.href='search_found.html'">Found Items</a>
            <a class="nav-link-item" onclick="window.location.href='report_found.html'">Report Found</a>
            <a class="nav-link-item" onclick="window.location.href='report_lost.html'">Report Lost</a>
            <a class="nav-link-item" onclick="window.location.href='history.html'">History</a>
            <a class="nav-link-item active" onclick="window.location.href='profile.html'">Profile</a>
        </nav>
    </header>

    <main class="container-fluid px-4 px-md-5 mt-4">

        <!-- LOGGED OUT -->
        <div id="loggedout-page">
            <div class="loggedout-icon">🔒</div>
            <p class="loggedout-msg">Please <a href="account.html">log in</a> to view your profile</p>
        </div>

        <!-- LOGGED IN -->
        <div id="loggedin-page" style="display: none;">

            <div class="mb-1"><span class="section-label">My Account</span></div>
            <h2 class="page-title mb-4">Profile</h2>

            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 col-xl-7">
                    <div class="profile-card">

                        <!-- ACCOUNT INFO -->
                        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
                            <div class="form-section-title mb-0" style="border:none; padding:0;">Account Info</div>
                            <button id="changepass-btn">Change Password</button>
                        </div>
                        <div style="border-bottom: 1px solid var(--border); margin-bottom: 1.25rem;"></div>

                        <div class="row g-3">
                            <div class="col-12">
                                <label for="email">Email</label>
                                <input id="email" value="placeholder@email.com" readonly>
                            </div>
                        </div>

                        <!-- CHANGE PASSWORD PANEL -->
                        <div id="changepass-form" style="display: none;">
                            <p class="changepass-title mb-3">Change Password</p>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="old-pass">Old Password</label>
                                    <input type="password" id="old-pass" placeholder="Enter current password">
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="new-pass0">New Password</label>
                                    <input type="password" id="new-pass0" placeholder="New password">
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="new-pass1">Confirm <span class="pass-sublabel">(repeat)</span></label>
                                    <input type="password" id="new-pass1" placeholder="Repeat new password">
                                </div>
                                <div class="col-12 d-flex gap-2 justify-content-end">
                                    <button id="cancel-changepass-btn">Cancel</button>
                                    <button id="submit-changepass-btn">Submit</button>
                                </div>
                            </div>
                        </div>

                        <hr class="section-divider">

                        <!-- PERSONAL DETAILS -->
                        <div class="form-section-title">Personal Details</div>

                        <div class="row g-3">

                            <div class="col-12">
                                <label for="full-name">Full Name</label>
                                <input id="full-name" type="text" placeholder="Bob John C. Doe">
                            </div>

                            <div class="col-12 col-sm-6">
                                <label for="student-id">Student ID</label>
                                <input id="student-id" type="text" placeholder="20XX-XXXXX">
                            </div>

                            <div class="col-12 col-sm-6">
                                <label for="course-section">Course &amp; Section</label>
                                <input id="course-section" type="text" placeholder="BSXX-1X">
                            </div>

                            <div class="col-12">
                                <label for="fb-profile">Facebook Profile URL</label>
                                <input id="fb-profile" type="url" placeholder="https://www.facebook.com/xxxxxxxxx">
                            </div>

                            <div class="col-12 col-sm-6">
                                <label for="contact-no">Phone Number</label>
                                <input id="contact-no" type="tel" placeholder="09xxxxxxxxx">
                            </div>

                            <div class="col-12 col-sm-6 d-flex align-items-end">
                                <p class="joined-text">Joined on: <span id="account-createdat">—</span></p>
                            </div>

                            <hr>

                            <div class="col-12 mt-1">
                                <button id="save-btn">Save Changes</button>
                            </div>

                        </div>

                        <hr class="section-divider">

                        <button id="logout-btn">Logout</button>

                    </div>
                </div>
            </div>

        </div>

    </main>

    <script type="module" src="./js/profile.js"></script>
</body>
</html>
