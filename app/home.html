<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYCIfinder</title>
</head>
<body>
    <header>
        <h2>DYCIfinder</h2>
        <button id="foundSomethingButton" onclick="window.location.href='post_found.html'">I found something</button>
        <button>I lost something</button>
    </header>
    <section>
        <h3>Unclaimed Items</h3>
        <div>
            <label for="keywordInput">Keyword</label>
            <input type="text" id="keywordInput" placeholder="Search items…">
            <label for="categorySelection">Category</label>
            <select id="categorySelection">
                <option>Any</option>
            </select>
            <label for="locationSelection">Location</label>
            <select id="locationSelection">
                <option>Anywhere</option>
            </select>
            <label for="sortOptions">Sort by</label>
            <select id="sortOptions">
                <option>Newest first</option>
                <option>Oldest first</option>
            </select>
            <button id="searchButton">Apply</button>
        </div>
        <p>Results:</p>
        <div id="foundPosts">
            <template id="foundPostTemplate">
                <div>
                    <h3 class="name">Item Name</h3>
                    <p class="category">Category: Category123</p>
                    <p class="location">Found at: Location123</p>
                    <p class="date">Found on: 2026-04-10</p>
                    <button class="claimButton">Claim & Submit Proof</button>
                </div>
            </template>
        </div>
        <div>
            <button id="prevPageButton">Prev</button>
            <span id="pageNumber">Page 1</span>
            <button id="nextPageButton">Next</button>
        </div>
    </section>
    <script type="module" src="js/home.js"></script>
</body>
</html>
