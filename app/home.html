<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYCIfinder</title>
</head>
<body>
    <div>
        <h1>DYCIfinder</h1>
        <p>afahop fhouagf lorep ipsum</p>
    </div>
    <div>
        <button>I found something</button>
        <button>I lost something</button>
    </div>
    <hr>
    <h2>Unclaimed Lost Items</h2>
    <div>
        <span>Enter keyword:</span>
        <input type="text" id="keywordInput">
        <div>
            <span>Items that are:</span>
            <select id="categorySelection">
                <option>Any</option>
            </select>
        </div>
        <div>
            <span>Items found at:</span>
            <select id="locationSelection">
                <option>Anywhere</option>
            </select>
        </div>
        <span>
            <select id="sortOptions">
                <option>Newest first</option>
                <option>Oldest first</option>
            </select>
        </span>
        <button id="searchButton">Apply filters</button>
    </div>
    <div>
        <p>Results:</p>
    </div>
    <div id="foundPosts">
        <template id="foundPostTemplate">
            <div class="foundPost">
                <h3 class="title">Item Name</h3>
                <p class="category">Category: Category123</p>
                <p class="location">Found at: Location123</p>
                <p class="date">Found on: 2026-04-10</p>
                <button class="claimButton">Claim & Submit Proof</button>
            </div>
        </template>
    </div>
    <br>
    <div>
        <button id="prevPageButton">prev</button>
        <button id="nextPageButton">next</button>
    </div>
    <hr>
    <button>admin</button>
    
    <script type="module" src="js/home.js"></script>
</body>
</html>
