<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYCIfinder</title>
</head>
<body>
    <h2>Claim and Proof of Ownership</h2>
    <div>
        Claim Description for Proof:
        <textarea id="claimDescription"></textarea>
        Claimant Name:
        <input type="text" id="claimantName">
        Facebook Profile:
        <input type="text" id="fbProfile">
        Contact Number:
        <input type="text" id="contactno">
        Email Address:
        <input type="text" id="email">
        Additional Contact Info:
        <textarea id="contactinfo"></textarea>
        <button id="submitClaimButton">Submit Claim</button>
    </div>

    <script type="module" src="js/post_claim.js"></script>
</body>
</html>
